name: Sync IPTV Data

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  sync:
    name: Sync IPTV Streams to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Clone iptv-org/iptv to get M3U files for stream URL extraction.
      # This avoids depending on their hosted API.
      - name: Checkout iptv-org/iptv
        uses: actions/checkout@v4
        with:
          repository: iptv-org/iptv
          path: iptv-master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: our-app/sync-engine/package-lock.json

      - name: Install dependencies
        working-directory: our-app/sync-engine
        run: npm ci

      - name: Run sync
        working-directory: our-app/sync-engine
        run: npx tsx src/index.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DATA_DIR: ./data
          IPTV_MASTER_PATH: ../../iptv-master
